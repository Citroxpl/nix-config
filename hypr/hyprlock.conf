# Minimal CLI-style lockscreen for Hyprland

general {
    disable_loading_bar = true
}

background {
    # solid black background
    color = rgba(0,0,0,1.0)
}

label {
    # display current time in center
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(200,200,200,1.0)
    font_size = 40
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    # minimal password input field
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255,255,255,0.2)
    inner_color = rgba(0,0,0,0.5)
    font_color = rgba(255,255,255,1.0)

    position = 0, -20
    halign = center
    valign = center
}
